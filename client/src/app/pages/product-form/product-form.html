<div class="mx-auto max-w-4xl space-y-8">
  <section class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.25em] text-cyan-300">
        Product Management
      </p>

      <h1 class="mt-2 text-3xl font-black leading-tight sm:text-4xl">
        {{ isEdit ? 'Edit Product' : 'Add Product' }}
      </h1>

      <p class="mt-2 text-sm text-slate-400 sm:text-base">
        Manage product information, supplier, category, stock quantity, and image upload.
      </p>
    </div>

    <a
      routerLink="/products"
      class="rounded-full border border-white/10 bg-white/10 px-5 py-3 text-center text-sm font-bold text-slate-200 transition hover:bg-white/20">
      Back to Products
    </a>
  </section>

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="glass-card rounded-premium p-5 sm:p-8">

    <div class="grid grid-cols-1 gap-5 md:grid-cols-2">

      <div class="md:col-span-2">
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Product Name
        </label>
        <input
          type="text"
          formControlName="name"
          placeholder="Enter product name"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition placeholder:text-slate-500 focus:border-accent focus:shadow-cyanGlow"
        />
      </div>

      <div class="md:col-span-2">
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Description
        </label>

        <textarea
          formControlName="description"
          rows="3"
          placeholder="Enter product description (optional)"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition placeholder:text-slate-500 focus:border-accent focus:shadow-cyanGlow"
        ></textarea>
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Category
        </label>
        <select
          formControlName="category_id"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition focus:border-accent focus:shadow-cyanGlow">
          <option class="bg-slate-900" value="">Select Category</option>
          @for (c of categories; track c.id) {
            <option class="bg-slate-900" [value]="c.id">{{ c.name }}</option>
          }
        </select>
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Supplier
        </label>
        <select
          formControlName="supplier_id"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition focus:border-accent focus:shadow-cyanGlow">
          <option class="bg-slate-900" value="">Select Supplier</option>
          @for (s of suppliers; track s.id) {
            <option class="bg-slate-900" [value]="s.id">{{ s.name }}</option>
          }
        </select>
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Price
        </label>
        <input
          type="number"
          formControlName="price"
          placeholder="0.00"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition placeholder:text-slate-500 focus:border-accent focus:shadow-cyanGlow"
        />
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Quantity
        </label>
        <input
          type="number"
          formControlName="quantity"
          placeholder="0"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition placeholder:text-slate-500 focus:border-accent focus:shadow-cyanGlow"
        />
      </div>

      <div class="md:col-span-2">
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Status
        </label>
        <select
          formControlName="status"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-5 py-4 text-white outline-none transition focus:border-accent focus:shadow-cyanGlow">
          <option class="bg-slate-900" value="active">Active</option>
          <option class="bg-slate-900" value="inactive">Inactive</option>
        </select>
      </div>

      <div class="md:col-span-2">
        <label class="mb-2 block text-sm font-semibold text-slate-300">
          Product Image
        </label>

        <label
          class="flex cursor-pointer flex-col items-center justify-center rounded-3xl border border-dashed border-cyan-400/30 bg-white/5 p-8 text-center transition hover:border-cyan-300 hover:bg-white/10">

          @if (imagePreview) {
            <img
              [src]="imagePreview"
              class="mb-4 h-40 w-40 rounded-2xl object-cover shadow-lg"
            />
          } @else {
            <div class="mb-4 flex h-16 w-16 items-center justify-center rounded-3xl bg-cyan-500/10 text-3xl">
              🖼️
            </div>
          }

          <p class="font-bold text-white">
            {{ imagePreview ? 'Change image' : 'Click to upload product image' }}
          </p>

          <p class="mt-1 text-sm text-slate-400">
            PNG, JPG, JPEG supported
          </p>

          <input
            type="file"
            accept="image/*"
            (change)="onFileChange($event)"
            class="hidden"
          />
        </label>

        @if (selectedFile) {
          <p class="mt-3 rounded-2xl bg-white/10 px-4 py-3 text-sm text-cyan-200">
            Selected: {{ selectedFile.name }}
          </p>
        }
      </div>
    </div>

    @if (errorMessage) {
      <div class="mt-5 rounded-2xl border border-red-400/20 bg-red-500/10 p-4 text-sm text-red-200">
        {{ errorMessage }}
      </div>
    }

    <div class="mt-8 flex flex-col gap-3 sm:flex-row">
      <button
        type="submit"
        [disabled]="loading"
        class="premium-button w-full text-center disabled:cursor-not-allowed disabled:opacity-60">
        {{ loading ? 'Saving Product...' : 'Save Product' }}
      </button>
    </div>
  </form>
</div>
